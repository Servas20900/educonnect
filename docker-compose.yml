services:
  postgres:
    image: postgres:16-alpine
    container_name: Educonnect_postgres
    env_file:
      - ./educonnect-Backend/.env
    environment:
      POSTGRES_USER: ${DB_USER:-Educonnect_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Educonnect_secure_password_2024}
      POSTGRES_DB: ${DB_NAME:-dbeduconet}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - Educonnect_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-Educonnect_user} -d ${DB_NAME:-dbeduconet}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./educonnect-Backend
      dockerfile: Dockerfile.backend
    container_name: educonnectBackend
    env_file:
      - ./educonnect-Backend/.env
    volumes:
      - ./educonnect-Backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py seed_system --skip-admin &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - Educonnect_network

volumes:
  postgres_data:

networks:
  Educonnect_network:
    driver: bridge

