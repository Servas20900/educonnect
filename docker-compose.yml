services:
  postgres:
    image: postgres:16-alpine
    container_name: Educonnect_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ProyectoG7!
      POSTGRES_DB: educonnect_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - Educonnect_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d educonnect_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./educonnect-Backend
      dockerfile: Dockerfile  
    container_name: educonnectBackend
    env_file:
      - ./educonnect-Backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:ProyectoG7!@postgres:5432/educonnect_db
      DB_HOST: postgres
    volumes:
      - ./educonnect-Backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy  
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - Educonnect_network

volumes:
  postgres_data:

networks:
  Educonnect_network:
    driver: bridge

